name: Build and deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# SamKirkland/FTP-Deploy-Action@v4.3.5 still targets Node 20. The env var
# below opts it into Node 24 so it runs cleanly past the 2026-06-02 default
# switch and the 2026-09-16 Node 20 removal. The GitHub-official actions
# below (checkout, setup-node) are pinned to v5 which is natively Node 24,
# so they don't need the override. Remove this block when FTP-Deploy-Action
# ships a Node-24-native version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          protocol: ftps
          security: loose
          dangerous-clean-slate: false
