<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var m = localStorage.getItem('glint:color-mode') || 'light';
          var dark =
            m === 'dark' ||
            (m === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.mode = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.mode = 'light';
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007836" />
    <meta name="description" content="GlintBudget — track every dollar across every currency." />
    <title>GlintBudget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
